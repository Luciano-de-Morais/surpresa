<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor ❤️</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
  font-family:Arial;
  color:white;
  overflow:hidden;
}

h1{
  font-size:5rem;
}

p{
  font-size:1.3rem;
}

.botoes{
  margin-top:30px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-size:1rem;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.coracao{
  position:fixed;
  bottom:-20px;
  animation:subir linear forwards;
}

@keyframes subir{
  to{
    transform:translateY(-110vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<h1>❤️ Minha Vida ❤️</h1>

<p>Preparei algo especial para você 💖</p>

<p>Espero eu que goste pois fiz de coração❤️❤️</p>

<div class="botoes">

<a href="fotos.html">
<button>📸 Fotos</button>
</a>

<a href="carta.html">
<button>💌 Carta</button>
</a>

<a href="musc.html">
<button>🎵 Música</button>
</a>

<a href="tempo.html">
<button>⏳ Tempo Juntos</button>
</a>

</div>

<script>

function criarCoracao(){

  const coracao = document.createElement("div");

  coracao.classList.add("coracao");

  coracao.innerHTML = "❤️";

  coracao.style.left = Math.random()*100+"vw";

  coracao.style.fontSize =
  Math.random()*25+15+"px";

  coracao.style.animationDuration =
  Math.random()*3+4+"s";

  document.body.appendChild(coracao);

  setTimeout(()=>{
    coracao.remove();
  },7000);
}

setInterval(criarCoracao,300);

</script>


</body>
</html>
